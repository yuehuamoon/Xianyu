spring.application.name=discuss-trade
server.port=8085

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==============================================
# 数据库配置
# ==============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/YHtrade?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================
# MyBatis 配置
# ==============================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=commontrade.discusstrade.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==============================================
# JWT 配置
# ==============================================
jwt.secret=your-very-long-custom-key-must-be-at-least-256-bits-12345678901234567890123456789012
jwt.expiration=3600000